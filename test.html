<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width,initial-scale=1"> <title>Learning Portal</title> <script src="https://cdn.tailwindcss.com"></script> <style> *{ margin:0; padding:0; box-sizing:border-box; } body{ background:#020617; color:white; font-family:Arial,sans-serif; } .hero{ padding:80px 20px; text-align:center; background: linear-gradient( 135deg, #06b6d4, #3b82f6 ); } .hero h1{ font-size:3rem; font-weight:bold; } .hero p{ margin-top:15px; font-size:18px; } #cards{ display:grid; grid-template-columns: repeat(auto-fit,minmax(350px,1fr)); gap:30px; padding:40px; } .card{ background:rgba(15,23,42,.8); backdrop-filter:blur(15px); border:1px solid rgba(255,255,255,.08); border-radius:25px; padding:20px; transition:.4s; animation:fadeUp .7s ease; } .card:hover{ transform:translateY(-8px); box-shadow:0 15px 50px rgba(6,182,212,.3); } .card img{ width:100%; height:220px; object-fit:cover; border-radius:15px; margin-top:15px; } .day{ font-size:26px; font-weight:bold; color:#22d3ee; } .title{ font-size:22px; margin-top:10px; } .desc{ margin-top:10px; color:#cbd5e1; } .btn{ display:block; text-align:center; padding:12px; border-radius:10px; text-decoration:none; color:white; margin-top:12px; } .youtube{ background:#ef4444; } .resource{ background:#0891b2; } textarea{ width:100%; height:180px; background:#0f172a; border:1px solid #334155; color:white; padding:15px; border-radius:10px; margin-top:15px; } .submit-btn{ width:100%; background:#16a34a; padding:12px; border:none; border-radius:10px; margin-top:12px; color:white; cursor:pointer; } .remarks{ margin-top:15px; background:#111827; padding:15px; border-radius:10px; } .loading{ text-align:center; padding:80px; font-size:24px; } @keyframes fadeUp{ from{ opacity:0; transform:translateY(30px); } to{ opacity:1; transform:translateY(0); } } </style> </head> <body> <section class="hero"> <h1>Learning Dashboard</h1> <p> Daily Learning Roadmap </p> </section> <div id="cards"> <div class="loading"> Loading Data... </div> </div> <script> const API_URL = "PASTE_YOUR_SCRIPT_URL"; async function loadData(){ try{ const response = await fetch(API_URL); const data = await response.json(); const cards = document.getElementById("cards"); cards.innerHTML = ""; data.forEach(item=>{ cards.innerHTML += ` <div class="card"> <div class="day"> ${item.Day} </div> <div class="title"> ${item.Title} </div> <div class="desc"> ${item.Description} </div> <img src="${item.Image}" alt="Image"> <a href="${item.Youtube}" target="_blank" class="btn youtube"> ▶ Watch Video </a> <a href="${item.Resource}" target="_blank" class="btn resource"> 📚 Open Resource </a> <div style="margin-top:20px;"> <h3 style="color:#facc15;"> Coding Challenge </h3> <p style="margin-top:10px;"> ${item.CodingTask} </p> <textarea placeholder="Write your code here"> </textarea> <button class="submit-btn"> Submit Code </button> </div> <div class="remarks"> <h3 style="color:#f472b6;"> Remarks </h3> <p style="margin-top:10px;"> ${item.Remarks} </p> </div> </div> `; }); }catch(error){ document.getElementById("cards").innerHTML = `<div class="loading" style="color:red;"> ${error} </div>`; } } loadData(); </script> </body> </html>
